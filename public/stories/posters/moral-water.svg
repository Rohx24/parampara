<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B0E2FF"/>
      <stop offset="100%" stop-color="#4A9E6B"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="320" cy="55" r="30" fill="#FFD700" opacity="0.9"/>
  <circle cx="320" cy="55" r="20" fill="#FFEC6E"/>
  <!-- Rays -->
  <line x1="320" y1="15" x2="320" y2="5" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="348" y1="27" x2="355" y2="20" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="360" y1="55" x2="370" y2="55" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <line x1="292" y1="27" x2="285" y2="20" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <!-- Mountains/hills -->
  <path d="M0 160 Q80 100 160 150 Q240 100 320 145 Q360 120 400 150 L400 280 L0 280Z" fill="#2D7A4F"/>
  <!-- River -->
  <path d="M0 200 Q100 185 200 200 Q300 215 400 200 L400 250 Q300 240 200 250 Q100 240 0 250Z" fill="url(#river)" opacity="0.85"/>
  <!-- River shimmer -->
  <path d="M50 215 Q100 208 150 215" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M220 210 Q270 204 320 210" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Child by river -->
  <circle cx="150" cy="185" r="12" fill="#8B5E3C"/>
  <rect x="140" y="194" width="20" height="30" rx="6" fill="#E67E22"/>
  <path d="M138 200 Q128 215 132 230" stroke="#E67E22" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Water pot -->
  <ellipse cx="128" cy="232" rx="8" ry="10" fill="#B87333"/>
  <ellipse cx="128" cy="222" rx="5" ry="3" fill="#D4943A"/>
  <!-- Small bird on rock -->
  <ellipse cx="230" cy="198" rx="8" ry="5" fill="#888"/>
  <circle cx="234" cy="195" r="4" fill="#888"/>
  <path d="M237 195 L243 193" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Trees -->
  <rect x="55" y="140" width="8" height="40" fill="#5D3A1A"/>
  <ellipse cx="59" cy="135" rx="18" ry="22" fill="#27AE60"/>
  <rect x="340" y="130" width="8" height="50" fill="#5D3A1A"/>
  <ellipse cx="344" cy="125" rx="20" ry="25" fill="#229954"/>
</svg>
